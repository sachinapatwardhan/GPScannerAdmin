<div id="e-commerce-products" class="page-layout carded fullwidth" layout="row" ng-show="!flag">
    <div class="top-bg md-accent-bg"></div>
    <div class="center" layout="column" flex>
        <div class="header" layout="row" layout-wrap layout-align="space-between center">
            <div class="white-fg" layout="row" layout-gt-xs="row" layout-gt-sm="column" layout-align="start start">
                <div class="h1" layout="row" layout-align="start center">
                    <md-icon md-font-icon="icon-cube-outline"></md-icon>
                    <span translate="Manage Media">Manage Media</span>
                </div>
                <div class="product-count secondary-text" hide-xs>
                    <span>Total Media :</span>
                    <b>{{lstTotal}}</b>
                </div>
            </div>
            <div class="search" layout="row" layout-align="start center" flex="60" flex-gt-xs="60" flex-gt-sm="33" align="center">
                <md-icon md-font-icon="icon-magnify" class="white-text icon search-icon"></md-icon>
                <input id="modelsearch" ng-model="Search" ng-change="GetSerch(Search)" class="search-input" type="text" placeholder="Search" translate translate-attr-placeholder="SEARCH" flex>
            </div>
            <div flex="40" flex-gt-xs="40" flex-gt-sm="33" layout="row" layout-align="end center">
                <div ng-if="FlgAddedEditlocal">
                    <md-button class="md-raised md-background" ng-click="vm.Reset()">
                        <span translate="Add New Media">Add New Media</span>
                    </md-button>
                </div>
            </div>
        </div>
        <div class="content-card" layout="column" flex>
            <div class="content fullpage-datatable" layout="column" flex>
                <table id="Mediatable" class="dataTable cell-border row-border hover" datatable="" dt-instance="vm.dtInstance" dt-columns="vm.dtColumns" dt-options="vm.dtOptions" width="100%">
                    <thead>
                        <tr>
                            <th class="all">
                                <div class="table-header">
                                    <span class="column-title">No</span>
                                </div>
                            </th>
                            <th class="secondary-text">
                                <div class="table-header">
                                    <span class="column-title">Image</span>
                                </div>
                            </th>
                            <th class="secondary-text">
                                <div class="table-header">
                                    <span class="column-title">Name</span>
                                </div>
                            </th>
                            <th class="secondary-text">
                                <div class="table-header">
                                    <span class="column-title">Author</span>
                                </div>
                            </th>
                            <th class="secondary-text">
                                <div class="table-header">
                                    <span class="column-title">Alt Text</span>
                                </div>
                            </th>
                            <th class="all">
                                <div class="table-header">
                                    <span class="column-title">Action</span>
                                </div>
                            </th>
                        </tr>
                    </thead>
                </table>
            </div>
        </div>
    </div>
</div>
<div class="page-layout simple tabbed" layout="column" ng-show="flag">
    <div class="header md-accent-bg" layout="row" layout-align="start center">
        <div class="white-fg" layout="row" layout-align="start center" flex>
            <md-button class="goto-products-button md-icon-button" aria-label="Go to Media" ng-click="gotoMediaList()">
                <md-icon md-font-icon="icon-arrow-left"></md-icon>
            </md-button>
            <div layout="row" layout-align="start center">
                <div layout="column" layout-align="start start">
                    <div class="subtitle secondary-text">
                        <span translate="Media Detail">Media Detail</span>
                    </div>
                </div>
            </div>
        </div>
        <div>

        </div>
    </div>
    <div class="content" layout-margin>
        <div class="product-detail-form-container md-background-bg md-whiteframe-1dp">
            <md-content class="md-padding">
                <form name="formMediadetails" novalidate class="md-inline-form" aria-invalid="false">
                    <div class="content">
                        <div class="custom-content">
                            <md-content class="md-padding">
                                <lf-ng-md-file-input name="files00" lf-files="Mediafiles" lf-api="apiMedia" lf-required lf-maxcount="10" lf-filesize="10MB" lf-mimetype="image/*" multiple drag preview></lf-ng-md-file-input>
                                <div ng-messages="FormMedia.files00.$error" style="color:red;">
                                    <div ng-message="required">This is required</div>
                                    <div ng-message="maxcount">Too much files</div>
                                    <div ng-message="filesize">File size too large</div>
                                    <div ng-message="mimetype">Only image file supported</div>
                                </div>
                                <md-button type="button" ng-disabled="FormMedia.$invalid" class="md-raised md-primary" ng-click="UploadImage()">Submit</md-button>
                            </md-content>
                        </div>
                        <div align="left">
                            <md-button class="md-raised md-primary" ng-disabled="!formMediadetails.$valid" ng-click="CreateMediaDetails(model)">Save</md-button>
                            <md-button class="md-raised md-warn" ng-click="ResetModel()">Cancel</md-button>
                        </div>
                    </div>
                </form>
            </md-content>
        </div>
    </div>
</div>
