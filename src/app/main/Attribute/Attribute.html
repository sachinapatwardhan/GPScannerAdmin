<div id="e-commerce-products" class="page-layout carded fullwidth" layout="row" ng-show="!flag">
    <div class="top-bg md-accent-bg"></div>

    <div class="center" layout="column" flex>

        <div class="header" layout="row" layout-wrap layout-align="space-between center">
            <div class="white-fg" layout="row" layout-gt-xs="row" layout-gt-sm="column" layout-align="start start">
                <div class="h1" layout="row" layout-align="start center">
                    <md-icon md-font-icon="icon-cube-outline"></md-icon>
                    <span translate=" Attribute"> Attribute</span>
                </div>
                <div class="product-count secondary-text" hide-xs>
                    <span>Total  Attribute :</span>
                    <b>{{lstProductAttribute.length}}</b>
                </div>
            </div>

            <div class="search" layout="row" layout-align="start center" flex="60" flex-gt-xs="60" flex-gt-sm="33" align="center">
                <md-icon md-font-icon="icon-magnify" class="white-text icon search-icon"></md-icon>
                <input id="modelsearch" ng-model="modelSearch.Search" ng-change="GetSerch(modelSearch.Search)" class="search-input" type="text" placeholder="Search" translate translate-attr-placeholder="SEARCH" flex>
            </div>

            <div flex="40" flex-gt-xs="40" flex-gt-sm="33" layout="row" layout-align="end center">

                <div ng-if="FlgAddedEditlocal">
                    <md-button class="md-raised md-background" ng-click="AddNew()">
                        <span translate="Add New  Attribute">Add New  Attribute</span>
                    </md-button>
                </div>
            </div>
        </div>

        <div class="content-card" layout="column" flex>
            <div class="content fullpage-datatable" layout="column" flex>
                <table class="dataTable row-border cell-border hover" datatable="ng" dt-instance="vm.dtInstance" dt-options="vm.dtOptions">
                    <thead>
                        <tr>
                            <th class="all">
                                <div class="table-header">
                                    <span class="column-title">No</span>
                                </div>
                            </th>
                            <th class="secondary-text">
                                <div class="table-header">
                                    <span class="column-title">Name</span>
                                </div>
                            </th>
                            <th class="secondary-text">
                                <div class="table-header">
                                    <span class="column-title">Description</span>
                                </div>
                            </th>
                            <th class="all">
                                <div class="table-header">
                                    <span class="column-title">Action</span>
                                </div>
                            </th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr ng-repeat="o in lstProductAttribute">
                            <td>{{ $index+1 }}</td>
                            <td>{{ o.Name }}</td>
                            <td>{{ o.Description }}</td>
                            <td class="dt-body-center">
                                <md-button class="edit-button md-icon-button" ng-if="FlgModifiedAccess" ng-click="FetchProductAttributeById(o)">
                                    <md-icon md-font-icon="icon-pencil" class="s18 green-500-fg"></md-icon>
                                    <md-tooltip md-visible="" md-direction="">Edit</md-tooltip>
                                </md-button>
                                <md-button class="edit-button md-icon-button" ng-if="FlgDeletedAccess" ng-click="DeleteProductAttribute(o.Id)">
                                    <md-icon md-font-icon="icon-trash" class="s18 red-500-fg"></md-icon>
                                    <md-tooltip md-visible="" md-direction="">Delete</md-tooltip>
                                </md-button>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<div class="page-layout simple tabbed" layout="column" ng-show="flag">
    <div class="header md-accent-bg" layout="row" layout-align="start center">
        <div class="white-fg" layout="row" layout-align="start center" flex>
            <md-button class="goto-products-button md-icon-button" aria-label="Go to Bank" ng-click="ResetModel()">
                <md-icon md-font-icon="icon-arrow-left"></md-icon>
            </md-button>
            <div layout="row" layout-align="start center">
                <div layout="column" layout-align="start start">
                    <div class="subtitle secondary-text">
                        <span translate=" Attribute List"> Attribute List</span>
                    </div>
                </div>
            </div>
        </div>
        <div>

        </div>
    </div>

    <div class="content" layout-margin>
        <div class="product-detail-form-container md-background-bg md-whiteframe-1dp">

            <form name="formProductAttribute" class="md-inline-form">
                <md-content class="md-padding">
                    <div class="content">
                        <md-input-container class="md-block" flex-gt-sm="50" ng-hide="true">
                            <label>Id</label>
                            <input ng-model="model.Id">
                        </md-input-container>
                        <md-input-container class="md-block" flex-gt-sm="50">
                            <label>Product attribute name</label>
                            <input name="Name" ng-model="model.Name" ng-required="true" maxlength="50" md-maxlength="50">
                            <div ng-messages="formProductAttribute.Name.$error" ng-if="formProductAttribute.Name.$touched">
                                <div ng-message="required">
                                    <span>Product attribute name is required</span>
                                </div>
                            </div>
                        </md-input-container>
                        <md-input-container class="md-block" flex-gt-sm="50">
                            <label>Description</label>
                            <input name="Description" ng-model="model.Description">
                        </md-input-container>
                        <div align="left">
                            <md-button class="md-raised md-primary" ng-disabled="!formProductAttribute.$valid" ng-click="CreateProductAttribute(model)">Save</md-button>
                            <md-button class="md-raised md-warn" ng-click="Reset()">Cancel</md-button>
                        </div>
                    </div>
                </md-content>
            </form>

        </div>
    </div>

</div>
