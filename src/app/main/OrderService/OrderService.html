<div id="e-commerce-products" class="page-layout carded fullwidth" layout="row">
  <div class="top-bg md-accent-bg"></div>
  <div class="center" layout="column" flex>
    <div class="header" layout="row" layout-wrap layout-align="space-between center">
      <div class="white-fg" layout="row" layout-gt-xs="row" layout-gt-sm="column" layout-align="start start">
        <div class="h1" layout="row" layout-align="start center">
          <md-icon md-font-icon="icon-cube-outline"></md-icon>
          <span translate="Order Service">Order Service</span>
        </div>
        <div class="product-count secondary-text" hide-xs>
          <span>Order Service :</span>
          <b>{{lstdata.length}}</b>
        </div>
      </div>
      <div class="search" layout="row" layout-align="start center" flex="60" flex-gt-xs="60" flex-gt-sm="33" align="center">
        <md-icon md-font-icon="icon-magnify" class="white-text icon search-icon"></md-icon>
        <input id="modelsearch" ng-model="Search" ng-change="GetSerch(Search)" class="search-input" type="text" placeholder="Search" translate translate-attr-placeholder="SEARCH" flex>
      </div>
      <div flex="40" flex-gt-xs="40" flex-gt-sm="33" layout="row" layout-align="end center">
        <md-button class="md-icon-button  md-raised md-hue-2" ng-click="toggle()" aria-label="Search">
          <md-icon md-font-icon="icon-filter-variant"></md-icon>
          <md-tooltip md-visible="" md-direction="">Advance Search</md-tooltip>
        </md-button>
      </div>
    </div>
    <div class="content-card" layout="column" flex>
      <div class="ShowContentBox">
        <i ng-show="flgforIcon" ng-click="toggle()" class="icon-close-circle-outline right closeIcon"></i>
        <div layout="row" layout-wrap>
          <md-input-container class="md-block" flex="100" flex-gt-xs="50" flex-gt-sm="25" flex-gt-md="15">
            <label>Type</label>
            <md-select ng-model="modelSearch.Type" ng-change="GetAllOrderService(true)">
              <md-option value="0">ALL</md-option>
              <md-option value="{{o.id}}" ng-repeat="o in lstProductTypes">{{o.AppName}}</md-option>
            </md-select>
          </md-input-container>
          <md-input-container class="md-block" flex="100" flex-gt-xs="50" flex-gt-sm="25" flex-gt-md="20">
            <label>Start Date</label>
            <input name="Start" mdc-datetime-picker date="true" time="false" type="text" id="time" max-date="modelSearch.EndDate" format="DD-MM-YYYY" ng-model="modelSearch.StartDate">
          </md-input-container>
          <md-input-container class="md-block" flex="100" flex-gt-xs="50" flex-gt-sm="25" flex-gt-md="20">
            <label>End Date</label>
            <input name="End" mdc-datetime-picker date="true" time="false" type="text" id="time" min-date="modelSearch.StartDate" format="DD-MM-YYYY" ng-model="modelSearch.EndDate">
          </md-input-container>

          <md-input-container class="md-block" flex="100" flex-gt-xs="50" flex-gt-sm="25" flex-gt-md="15">
            <label>Status</label>
            <md-select ng-model="modelSearch.Status" ng-change="GetAllOrderService(true)">
              <md-option value="0">ALL</md-option>
              <md-option value="{{o.id}}" ng-repeat="o in LstAllStatus">{{o.OrderStatus}}</md-option>
            </md-select>
          </md-input-container>
          <div align="left">
            <md-button class="md-icon-button md-accent md-raised md-hue-2" ng-click="GetAllOrderService(true)" aria-label="Search">
              <md-icon md-font-icon="icon-magnify"></md-icon>
              <md-tooltip md-visible="" md-direction="">Search </md-tooltip>
            </md-button>
            <md-button class="md-icon-button md-warn md-raised md-hue-2" ng-click="SearchReset()" aria-label="Reset Search">
              <md-icon md-font-icon="icon-refresh"></md-icon>
              <md-tooltip md-visible="" md-direction="">Reset Search </md-tooltip>
            </md-button>
          </div>
        </div>
      </div>
      <div class="content fullpage-datatable" layout="column" flex ng-show="ShowDtl==false">
        <table id="OrderServicetable" class="dataTable cell-border row-border hover" datatable="" dt-instance="dtInstance" dt-columns="dtColumns" dt-options="dtOptions" width="100%">
          <thead>
            <tr>
              <th class="all">
                <div class="table-header">
                  <span class="column-title">No</span>
                </div>
              </th>
              <th class="secondary-text">
                <div class="table-header">
                  <span class="column-title">Type</span>
                </div>
              </th>
              <th class="secondary-text">
                <div class="table-header">
                  <span class="column-title">Order No</span>
                </div>
              </th>
              <th class="secondary-text">
                <div class="table-header">
                  <span class="column-title">Email</span>
                </div>
              </th>

              <th class="secondary-text">
                <div class="table-header">
                  <span class="column-title">Created Date</span>
                </div>
              </th>
              <th class="secondary-text">
                <div class="table-header">
                  <span class="column-title">Expiry Date</span>
                </div>
              </th>
              <th class="secondary-text">
                <div class="table-header">
                  <span class="column-title">Order Total</span>
                </div>
              </th>
              <th class="secondary-text">
                <div class="table-header">
                  <span class="column-title">Device</span>
                </div>
              </th>
              <th class="secondary-text">
                <div class="table-header">
                  <span class="column-title">Country</span>
                </div>
              </th>
              <th class="secondary-text">
                <div class="table-header">
                  <span class="column-title">Status</span>
                </div>
              </th>
              <th class="all">
                <div class="table-header">
                  <span class="column-title">Action</span>
                </div>
              </th>
            </tr>
          </thead>
        </table>
      </div>
      <div class="content" layout-margin ng-show="ShowDtl==true">
        <div class="product-detail-form-container md-background-bg md-whiteframe-1dp">
          <form name="FormManageDate" novalidate class="ms-stepper" aria-invalid="false" style="padding: 24px">
            <h2 style="color:green;">Order No : {{objOrderData.PurchaseOrderNumber}}</h2>
            <br/>
            <md-input-container class="md-block" flex="50">
              <label> Date</label>
              <input name="dStart" mdc-datetime-picker date="true" time="false" ng-required="true" type="text" id="time" format="DD-MM-YYYY" ng-model="modelUpdateDate.CreatedOnUtc">
            </md-input-container>
            <div>
              <md-button class="md-raised md-primary" ng-click="UpdateOrderServiceDates(modelUpdateDate)" ng-disabled="FormManageDate.$invalid">
                Update Dates</md-button>
              <md-button class="md-raised md-warn" ng-click="ResetUpdateDates()">
                cancel</md-button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
