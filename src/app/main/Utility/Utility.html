<div id="e-commerce-products" class="page-layout carded fullwidth" layout="row" ng-show="!flag">
    <div class="top-bg md-accent-bg"></div>
    <div class="center" layout="column" flex>
        <div class="header" layout="row" layout-wrap layout-align="space-between center">
            <div class="white-fg" layout="row" layout-gt-xs="row" layout-gt-sm="column" layout-align="start start">
                <div class="h1" layout="row" layout-align="start center">
                    <md-icon md-font-icon="icon-cube-outline"></md-icon>
                    <span translate="Utility">Utility</span>
                </div>
            </div>
            <div class="search" layout="row" layout-align="start center" flex="60" flex-gt-xs="60" flex-gt-sm="33" align="center">
                <md-icon md-font-icon="icon-magnify" class="white-text icon search-icon"></md-icon>
                <input id="modelsearch" ng-model="Search" ng-change="GetSerch(Search)" class="search-input" type="text" placeholder="Search" translate translate-attr-placeholder="SEARCH" flex>
            </div>
            <div flex="40" flex-gt-xs="40" flex-gt-sm="33" layout="row" layout-align="end center">
                <div>
                    <md-button class="md-raised md-background" ng-click="showDefultValue()">
                        <span translate="Default Value">Default Value</span>
                    </md-button>
                </div>
                <div ng-if="FlgAddedEditlocal">
                    <md-button class="md-raised md-background" ng-click="SendCommand()" ng-disabled="selected.length ==0">
                        <span translate="Send">Send</span>
                    </md-button>
                </div>
            </div>
        </div>
        <div class="content-card" layout="column" flex>
            <div class="content fullpage-datatable" layout="column" flex>
                <table id="VehicleDetail" class="dataTable row-border hover" datatable="" dt-instance="dtInstance" dt-columns="dtColumns" dt-options="dtOptions" width="100%">
                    <thead>
                        <tr>
                            <th class="all ">
                                <div class="table-header ">
                                    <span class="column-title ">No</span>
                                </div>
                            </th>
                            <!--<th class="secondary-text ">
                                <div class="table-header ">
                                    <span class="column-title ">SIM Name</span>
                                </div>
                            </th>-->
                            <th class="secondary-text ">
                                <div class="table-header ">
                                    <span class="column-title ">Vehicle</span>
                                </div>
                            </th>
                            <th class="secondary-text ">
                                <div class="table-header ">
                                    <span class="column-title ">Tracker Id</span>
                                </div>
                            </th>
                            <th class="secondary-text ">
                                <div class="table-header ">
                                    <span class="column-title ">Device Type</span>
                                </div>
                            </th>
                            <th class="secondary-text ">
                                <div class="table-header ">
                                    <span class="column-title ">Is Online</span>
                                </div>
                            </th>
                            <th class="all ">
                                <div class="table-header ">
                                    <span class="column-title ">Select Device</span>
                                </div>
                            </th>
                        </tr>
                    </thead>

                </table>
            </div>
        </div>
    </div>
</div>
<div class="page-layout simple tabbed " layout="column " ng-show="flag ">
    <div class="header md-accent-bg " layout="row " layout-align="start center ">
        <div class="white-fg " layout="row " layout-align="start center " flex>
            <md-button class="goto-products-button md-icon-button " aria-label="Go to Vehicle " ng-click="ResetModel() ">
                <md-icon md-font-icon="icon-arrow-left "></md-icon>
            </md-button>
            <div layout="row " layout-align="start center ">
                <div layout="column " layout-align="start start ">
                    <div class="subtitle secondary-text ">
                        <span translate="SIM Info ">SIM Info</span>
                    </div>
                </div>
            </div>
        </div>
        <div>
        </div>
    </div>
    <div class="content " layout-margin>
        <div class="product-detail-form-container md-background-bg md-whiteframe-1dp ">
            <md-content class="md-padding ">
                <form name="formSIMInfo " novalidate class="md-inline-form " aria-invalid="false ">
                    <div class="content ">
                        <div layout="row " layout-wrap>
                            <!--<md-input-container class="md-block " flex="100 " flex-gt-sm="25 ">
                                <label>SIM Name</label>
                                <input type="text " name="SerialNum " ng-model="model.SerialNum " required>
                                <div ng-messages="formSIMInfo.SerialNum.$error " ng-if="formSIMInfo.Name.$touched " role="alert ">
                                    <div ng-message="required ">
                                        <span>SIM Name field is required</span>
                                    </div>
                                </div>
                            </md-input-container>-->
                            <md-input-container class="md-block " flex="100 " flex-gt-sm="25 ">
                                <label>Serial Number</label>
                                <input type="text " name="SerialNum " ng-model="model.SerialNum " required>
                                <div ng-messages="formSIMInfo.SerialNum.$error " ng-if="formSIMInfo.SerialNum.$touched " role="alert ">
                                    <div ng-message="required ">
                                        <span>Serial Number field is required</span>
                                    </div>
                                </div>
                            </md-input-container>
                            <md-input-container class="md-block " flex="100 " flex-gt-sm="25 ">
                                <label>Phone Number</label>
                                <input type="number " name="PhoneNum " ng-model="model.PhoneNum ">
                                <div ng-messages="formSIMInfo.PhoneNum.$error " ng-if="formSIMInfo.PhoneNum.$touched " role="alert ">
                                    <div ng-message="required ">
                                        <span>Phone Number field is required</span>
                                    </div>
                                </div>
                            </md-input-container>
                            <md-input-container class="md-block" flex="100" flex-gt-sm="25">
                                <label>Telephone Company</label>
                                <md-select Name="idTelCo" ng-model="model.idTelCo" md-on-close="clearSearchTerm()" data-md-container-class="selectdemoSelectHeader">
                                    <md-select-header class="demo-select-header">
                                        <input ng-model="vm.searchTermidTelCo" type="search" placeholder="Search for a Company.." class="demo-header-searchbox md-text" ng-keydown="onSearchChange($event)">
                                    </md-select-header>
                                    <md-option ng-value="{{o.id}}" ng-repeat="o in lstCompany | filter:vm.searchTermidTelCo | orderBy: 'Name'">{{o.Name}}</md-option>
                                </md-select>
                                <div ng-messages="formTrackingdetails.idTelCo.$error" ng-if="formTrackingdetails.idTelCo.$touched" role="alert">
                                    <div ng-message="required">
                                        <span>Tel Company is required.</span>
                                    </div>
                                </div>
                            </md-input-container>
                        </div>
                        <div align="left ">
                            <md-button class="md-raised md-primary " ng-disabled="!formSIMInfo.$valid " ng-click="SaveSIMInfo(model) ">Save</md-button>
                            <md-button class="md-accent md-raised " ng-click="Reset() ">Reset</md-button>
                            <md-button class="md-raised md-warn " ng-click="ResetModel() ">Cancel</md-button>
                        </div>
                    </div>
                </form>
            </md-content>
        </div>
    </div>
</div>
