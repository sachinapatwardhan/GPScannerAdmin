<div id="e-commerce-products" class="page-layout carded fullwidth" layout="row" ng-show="!flag">
  <div class="top-bg md-accent-bg"></div>
  <div class="center" layout="column" flex>
    <div class="header" layout="row" layout-wrap layout-align="space-between center">
      <div class="white-fg" layout="row" layout-gt-xs="row" layout-gt-sm="column" layout-align="start start">
        <div class="h1" layout="row" layout-align="start center">
          <md-icon md-font-icon="icon-cube-outline"></md-icon>
          <span translate="API AccessClient">API AccessClient</span>
        </div>
      </div>
      <div class="search" layout="row" layout-align="start center" flex="60" flex-gt-xs="60" flex-gt-sm="33" align="center">
        <md-icon md-font-icon="icon-magnify" class="white-text icon search-icon"></md-icon>
        <input id="modelsearch" ng-model="Search" ng-change="GetSerch(Search)" class="search-input" type="text" placeholder="Search"
          translate translate-attr-placeholder="SEARCH" flex>
      </div>
      <div flex="40" flex-gt-xs="40" flex-gt-sm="33" layout="row" layout-align="end center">
        <div>
          <md-button class="md-raised md-background" ng-click="AddnewAPIAccess()">
            <span translate="Add new API-AccessClient">Add New API-AccessClient</span>
          </md-button>
        </div>
      </div>
    </div>
    <div class="content-card" layout="column" flex>
      <div class="content fullpage-datatable" layout="column" flex>
      <table id="apiaccess"  class="dataTable row-border cell-border hover" datatable="" dt-instance="dtInstance" dt-columns="dtColumns"
                    dt-options="dtOptions" width="100%">
          <thead>
            <tr>
              <th class="all">
                <div class="table-header">
                  <span class="column-title">No</span>
                </div>
              </th>
              <th class="secondary-text">
                <div class="table-header">
                  <span class="column-title">Name</span>
                </div>
              </th>
              <th class="secondary-text">
                <div class="table-header">
                  <span class="column-title">Phone</span>
                </div>
              </th>
              <th class="secondary-text">
                <div class="table-header">
                  <span class="column-title">Email</span>
                </div>
              </th>
              <th class="secondary-text">
                <div class="table-header">
                  <span class="column-title">App Name</span>
                </div>
              </th>
               <th class="secondary-text">
                <div class="table-header">
                  <span class="column-title">Token</span>
                </div>
              </th>
               <th class="secondary-text">
                <div class="table-header">
                  <span class="column-title">Key</span>
                </div>
              </th>
              <th class="secondary-text">
                <div class="table-header">
                  <span class="column-title">Created Date</span>
                </div>
              </th>

              <th class="secondary-text">
                <div class="table-header">
                  <span class="column-title">IsActive</span>
                </div>
              </th>
              <th class="all">
                <div class="table-header">
                  <span class="column-title">Action</span>
                </div>
              </th>
            </tr>
          </thead>
        </table>
      </div>
    </div>
  </div>
</div>
<div class="page-layout simple tabbed" layout="column" ng-show="flag">
  <div class="header md-accent-bg" layout="row" layout-align="start center">
    <div class="white-fg" layout="row" layout-align="start center" flex>
      <md-button class="goto-products-button md-icon-button" aria-label="Go to Organization" ng-click="GoToLIst()">
        <md-icon md-font-icon="icon-arrow-left"></md-icon>
      </md-button>
      <div layout="row" layout-align="start center">
        <div layout="column" layout-align="start start">
          <div class="subtitle secondary-text">
            <span translate="AccessClient List">AccessClient List</span>
          </div>
        </div>
      </div>
    </div>
    <div>
    </div>
  </div>
  <div class="content" layout-margin>
    <div class="product-detail-form-container md-background-bg md-whiteframe-1dp">
      <form name="FormAccessCLient" novalidate class="ms-stepper" aria-invalid="false" style="padding: 24px">
        <div layout="row" layout-wrap>
          
          <md-input-container flex="100" flex-gt-sm="30" flex-gt-md="33">
            <label>Name </label>
            <input type="text" name="Name" ng-model="model.Name" required >
            <div ng-messages="FormAccessCLient.Name.$error" ng-if="FormAccessCLient.Name.$touched" role="alert">
              <div ng-message="required">
                <span>Name is required</span>
              </div>
            </div>
          </md-input-container>
          <md-input-container class="md-block" flex="100" flex-gt-xs="30" flex-gt-sm="33">
                                    <label>Mobile No</label>
                                    <input  name="mobileno" ng-model="model.Phone" ng-pattern='/^[+]*\d{2,4}[-]*\d{3,}[\s{1}]*\d{3,}$/' ng-maxlength="15">

                                    <div ng-messages="FormAccessCLient.mobileno.$error" ng-if="FormAccessCLient.mobileno.$touched">
                                        <div ng-message="maxlength">Mobile number can't be longer than 15 number</div>
                                        <div ng-message="pattern">Please Enter Vaild number</div>
                                    </div>
          </md-input-container>
          <md-input-container class="md-block" flex="100" flex-gt-xs="30" flex-gt-sm="33">
                                    <label>Email </label>
                                    <input type="Email" name="email" ng-model="model.Email" ng-pattern="/^.+@.+\..+$/">
                                    <div ng-messages="FormAccessCLient.email.$error" ng-if="FormAccessCLient.email.$touched">
                                        <div ng-message="pattern">
                                            Email must be a valid E-mail address
                                        </div>
                                    </div>
            </md-input-container>
            <md-input-container class="md-block" flex="100" flex-gt-xs="30" flex-gt-sm="33" >
                                <label>App Name</label>
                                <md-select Name="AppName" ng-model="model.AppName" md-on-close="clearSearchTerm()" data-md-container-class="selectdemoSelectHeader">
                                    <md-select-header class="demo-select-header">
                                        <input ng-model="searchTermidAppName" type="search" placeholder="Search for a APP Name.." class="demo-header-searchbox md-text" ng-keydown="onSearchChange($event)">
                                    </md-select-header>
                                    <md-option ng-value="{{o.id}}" ng-repeat="o in lstAppInfo | filter:searchTermidAppName track by o.id">{{o.AppName}}</md-option>
                                </md-select>
            </md-input-container>
           <md-input-container  flex="100" flex-gt-sm="30" flex-gt-md="33">
                <md-checkbox aria-label="View" name="IsActive" class="md-accent" ng-model="model.IsActive" >
                </md-checkbox>
                <span>IsActive</span>
           </md-input-container>
        </div>
        <div align="center">
          <md-button class="md-raised md-primary" ng-click="CreateApiAccess(model)" ng-disabled="FormAccessCLient.$invalid">
            save</md-button>
          <md-button class="md-accent md-raised" ng-click="ResetData()">Reset</md-button>
          <md-button class="md-raised md-warn" ng-click="Reset()">
            cancel</md-button>
        </div>
      </form>
    </div>
  </div>
</div>
