<div id="e-commerce-products" class="page-layout carded fullwidth" layout="row" ng-show="!flag">
    <div class="top-bg md-accent-bg"></div>
    <div class="center" layout="column" flex>
        <div class="header" layout="row" layout-wrap layout-align="space-between center">
            <div class="white-fg" layout="row" layout-gt-xs="row" layout-gt-sm="column" layout-align="start start">
                <div class="h1" layout="row" layout-align="start center">
                    <md-icon md-font-icon="icon-cube-outline"></md-icon>
                    <span translate="Device Renew Price">Device Renew Price</span>
                </div>
            </div>
            <div class="search" layout="row" layout-align="start center" flex="60" flex-gt-xs="60" flex-gt-sm="33" align="center">
                <md-icon md-font-icon="icon-magnify" class="white-text icon search-icon"></md-icon>
                <input id="search" ng-model="modelSearch.Search" ng-change="GetSerch(modelSearch.Search)" class="search-input" type="text" placeholder="Search" translate translate-attr-placeholder="SEARCH" flex>
            </div>
            <div flex="40" flex-gt-xs="40" flex-gt-sm="33" layout="row" layout-align="end center">


                <div ng-if="FlgAddedEditlocal">
                    <md-button class="md-icon-button  md-raised md-hue-2" ng-click="Reset()" aria-label="Search ">
                        <md-icon md-font-icon="icon-plus "></md-icon>
                        <md-tooltip md-visible=" " md-direction=" ">Add Device Renew Price</md-tooltip>
                    </md-button>
                </div>
            </div>
        </div>
        <div class="content-card " layout="column " flex>
            <div class="content fullpage-datatable " layout="column " flex ng-if="UserRoles == 'Super Admin'">
                <!-- <table class="dataTable cell-border row-border hover" datatable="ng" dt-options="dtCustomOptions" dt-instance="dtInstance" dt-column-defs="vm.dtColumnDefs" width="100%"> -->
                <table id="RenewDetail" class="dataTable row-border hover" datatable="" dt-instance="vm.dtInstance" dt-columns="dtColumns" dt-options="dtOptions" width="100%">
                    <thead>
                        <tr>
                            <th class="all ">
                                <div class="table-header ">
                                    <span class="column-title ">No</span>
                                </div>
                            </th>

                            <th class="secondary-text ">
                                <div class="table-header ">
                                    <span class="column-title ">User Name</span>
                                </div>
                            </th>
                            <th class="secondary-text ">
                                <div class="table-header ">
                                    <span class="column-title ">Type</span>
                                </div>
                            </th>
                            <th class="secondary-text ">
                                <div class="table-header ">
                                    <span class="column-title ">Price</span>
                                </div>
                            </th>
                            <th class="secondary-text ">
                                <div class="table-header ">
                                    <span class="column-title ">App Name</span>
                                </div>
                            </th>
                            <th class="secondary-text ">
                                <div class="table-header ">
                                    <span class="column-title ">Created Date</span>
                                </div>
                            </th>

                            <th class="all ">
                                <div class="table-header ">
                                    <span class="column-title ">Action</span>
                                </div>
                            </th>
                        </tr>
                    </thead>
                </table>
            </div>
            <div class="content fullpage-datatable " layout="column " flex ng-if="UserRoles != 'Super Admin'">
                <!-- <table class="dataTable cell-border row-border hover" datatable="ng" dt-options="dtCustomOptions" dt-instance="dtInstance" dt-column-defs="vm.dtColumnDefs" width="100%"> -->
                <table id="SIMDetail1" class="dataTable row-border hover" datatable="" dt-instance="vm.dtInstance" dt-columns="dtColumns" dt-options="dtOptions" width="100%">
                    <thead>
                        <tr>
                            <th class="all ">
                                <div class="table-header ">
                                    <span class="column-title ">No</span>
                                </div>
                            </th>
                            <th class="secondary-text ">
                                <div class="table-header ">
                                    <span class="column-title ">User Name</span>
                                </div>
                            </th>
                            <th class="secondary-text ">
                                <div class="table-header ">
                                    <span class="column-title ">Type</span>
                                </div>
                            </th>
                            <th class="secondary-text ">
                                <div class="table-header ">
                                    <span class="column-title ">Price</span>
                                </div>
                            </th>
                            <th class="secondary-text ">
                                <div class="table-header ">
                                    <span class="column-title ">Created Date</span>
                                </div>
                            </th>
                            <th class="all ">
                                <div class="table-header ">
                                    <span class="column-title ">Action</span>
                                </div>
                            </th>
                        </tr>
                    </thead>
                </table>
            </div>
        </div>
    </div>
</div>
<div class="page-layout simple tabbed " layout="column " ng-show="flag ">
    <div class="header md-accent-bg " layout="row " layout-align="start center ">
        <div class="white-fg " layout="row " layout-align="start center " flex>
            <md-button class="goto-products-button md-icon-button " aria-label="Go to Vehicle " ng-click="ResetModel() ">
                <md-icon md-font-icon="icon-arrow-left "></md-icon>
            </md-button>
            <div layout="row " layout-align="start center ">
                <div layout="column " layout-align="start start ">
                    <div class="subtitle secondary-text ">
                        <span translate="Device Renew Price">Device Renew Price</span>
                    </div>
                </div>
            </div>
        </div>
        <div>
        </div>
    </div>
    <div class="content " layout-margin>
        <div class="product-detail-form-container md-background-bg md-whiteframe-1dp ">
            <md-content class="md-padding ">
                <form name="formRenewPrice " novalidate class="md-inline-form " aria-invalid="false ">
                    <div class="content ">
                        <div layout="row " layout-wrap>
                            <md-input-container class="md-block" flex="20" flex-gt-sm="20" ng-if="UserRoles =='Super Admin'">
                                <label>App Name</label>
                                <md-select Name="AppName" ng-model="model.idApp" md-on-close="clearSearchTerm()" data-md-container-class="selectdemoSelectHeader" ng-change="GetAllAgent()" required>
                                    <md-select-header class="demo-select-header">
                                        <input ng-model="vm.searchTermidAppName" type="search" placeholder="Search for a APP Name.." class="demo-header-searchbox md-text" ng-keydown="onSearchChange($event)">
                                    </md-select-header>
                                    <md-option ng-value="{{o.id}}" ng-repeat="o in lstAppInfo | filter:vm.searchTermidAppName track by o.id">{{o.AppName}}</md-option>
                                </md-select>
                                <div ng-messages="formRenewPrice.idApp.$error" ng-if="formRenewPrice.idApp.$touched" role="alert">
                                    <div ng-message="required">
                                        <span>Tel Company is required.</span>
                                    </div>
                                </div>
                            </md-input-container>
                            <md-input-container class="md-block" flex="25" flex-gt-sm="25">
                                <label>Agent</label>
                                <md-select Name="IdUser" ng-model="model.IdUser" ng-disabled="model.idApp==''" md-on-close="clearSearchTerm()" data-md-container-class="selectdemoSelectHeader" ng-change="GetAllRetailer(model.agentId)" required>
                                    <md-select-header class="demo-select-header">
                                        <input ng-model="vm.searchagent" type="search" placeholder="Search for a Agent.." class="demo-header-searchbox md-text" ng-keydown="onSearchChange($event)">
                                    </md-select-header>
                                    <md-option ng-value="{{o.id}}" ng-repeat="o in lstAgent | filter:vm.searchagent | orderBy: 'email'">{{o.email}}</md-option>
                                </md-select>
                                <div ng-messages="formRenewPrice.IdUser.$error" ng-if="formRenewPrice.IdUser.$touched" role="alert">
                                    <div ng-message="required">
                                        <span>Agent is required.</span>
                                    </div>
                                </div>
                            </md-input-container>

                            <md-input-container class="md-block" flex="100" flex-gt-sm="25" required>
                                <label>Type</label>
                                <md-select ng-model="model.Type" name="Type" required>
                                    <md-option name="Type1" value="TK510" selected="true">TK510</md-option>
                                    <md-option name="Type2" value="TK208">TK208</md-option>
                                    <md-option name="Type3" value="TK228">TK228</md-option>
                                    <md-option name="Type4" value="GT08">GT08</md-option>
                                    <md-option name="Type5" value="MT05">MT05</md-option>
                                    <!-- <md-option name="Type6" value="Concox" ng-if="AppName != 'Trackox' || UserRoles == 'Super Admin'">Concox</md-option>
                                    <md-option name="Type9" value="GPSBox" ng-if="AppName != 'Trackox' || UserRoles == 'Super Admin'">GPSBox</md-option>
                                    <md-option name="Type8" value="TL109" ng-if="AppName == 'Trackox' || UserRoles == 'Super Admin'">TL109</md-option> -->
                                    <md-option name="Type7" value="Mob">Mob</md-option>

                                </md-select>
                            </md-input-container>
                            <md-input-container class="md-block" flex="100" flex-gt-sm="25">
                                <label>Price </label>
                                <input name="Price" type="number" ng-model="model.Price" required>
                                <div ng-messages="formRenewPrice.Price.$error" ng-if="formRenewPrice.Price.$touched">
                                    <div ng-message="required">
                                        <span>Price is required</span>
                                    </div>
                                </div>
                            </md-input-container>
                        </div>
                        <div align="left ">
                            <md-button class="md-raised md-primary " ng-disabled="!formRenewPrice.$valid " ng-click="SaveDevcieRenewPrice(model) ">Save</md-button>
                            <md-button class="md-accent md-raised " ng-click="Reset() ">Reset</md-button>
                            <md-button class="md-raised md-warn " ng-click="ResetModel() ">Cancel</md-button>
                        </div>
                    </div>
                </form>
            </md-content>
        </div>
    </div>
</div>
