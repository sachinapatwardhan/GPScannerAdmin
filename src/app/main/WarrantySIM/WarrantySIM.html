<div id="e-commerce-products" class="page-layout carded fullwidth" layout="row" ng-show="!flag">
    <div class="top-bg md-accent-bg"></div>
    <div class="center" layout="column" flex>
        <div class="header" layout="row" layout-wrap layout-align="space-between center">
            <div class="white-fg" layout="row" layout-gt-xs="row" layout-gt-sm="column" layout-align="start start">
                <div class="h1" layout="row" layout-align="start center">
                    <md-icon md-font-icon="icon-cube-outline"></md-icon>
                    <span translate="Warranty SIM">Warranty SIM</span>
                </div>
                <div class="product-count secondary-text" hide-xs>
                    <span>Total Warranty SIM :</span>
                    <b>{{lstTotal}}</b>
                </div>
            </div>
            <div class="search" layout="row" layout-align="start center" flex="60" flex-gt-xs="60" flex-gt-sm="33"
                align="center">
                <md-icon md-font-icon="icon-magnify" class="white-text icon search-icon"></md-icon>
                <input id="modelsearch" ng-model="Search" ng-change="GetSerch(Search)" class="search-input" type="text"
                    placeholder="Search" translate translate-attr-placeholder="SEARCH" flex>
            </div>
            <div flex="40" flex-gt-xs="40" flex-gt-sm="33" layout="row" layout-align="end center">
                <!-- <md-button class="md-icon-button  md-raised md-hue-2" ng-click="toggle()" aria-label="Search">
                    <md-icon md-font-icon="icon-filter-variant"></md-icon>
                    <md-tooltip md-visible="" md-direction="">Advance Search</md-tooltip>
                </md-button> -->
                <div ng-if="FlgAddedEditlocal">
                    <md-button class="md-raised md-background" ng-click="Reset()">
                        <span translate="Replace SIM">Replace SIM</span>
                    </md-button>
                </div>
            </div>
        </div>
        <div class="content-card" layout="column" flex>
            <div class="content fullpage-datatable" layout="column" flex>

                <table id="Warranty" class="dataTable row-border hover" datatable="" dt-instance="vm.dtInstance1"
                    dt-columns="dtColumns" dt-options="dtOptions" width="100%">
                    <thead>
                        <tr>
                            <th class="all">
                                <div class="table-header">
                                    <span class="column-title">No</span>
                                </div>
                            </th>

                            <th class="secondary-text">
                                <div class="table-header">
                                    <span class="column-title">Old SIM</span>
                                </div>
                            </th>
                            <th class="secondary-text">
                                <div class="table-header">
                                    <span class="column-title">New SIM</span>
                                </div>
                            </th>
                            <th class="secondary-text">
                                <div class="table-header">
                                    <span class="column-title">Created Date</span>
                                </div>
                            </th>
                        </tr>
                    </thead>
                </table>
            </div>
        </div>
    </div>
</div>
<div class="page-layout simple tabbed" layout="column" ng-show="flag">
    <div class="header md-accent-bg" layout="row" layout-align="start center">
        <div class="white-fg" layout="row" layout-align="start center" flex>
            <md-button class="goto-products-button md-icon-button" aria-label="Go to Vehicle" ng-click="init()">
                <md-icon md-font-icon="icon-arrow-left"></md-icon>
            </md-button>
            <div layout="row" layout-align="start center">
                <div layout="column" layout-align="start start">
                    <div class="subtitle secondary-text">
                        <span translate="Warranty SIM">Warranty SIM</span>
                    </div>
                </div>
            </div>
        </div>
        <div>
        </div>
    </div>
    <div class="content" layout-margin>
        <div class="product-detail-form-container md-background-bg md-whiteframe-1dp">
            <md-content class="md-padding">
                <form name="Formwarranty" novalidate class="md-inline-form" aria-invalid="false">
                    <div class="content">
                        <div layout="row" layout-wrap>
                            <!-- <md-input-container class="md-block" flex-gt-sm="50" flex-gt-md="33"
                                ng-if="UserRoles == 'Super Admin'">
                                <label>App Name</label>
                                <md-select Name="AppName" ng-model="model.idApp" md-on-close="clearSearchTerm()"
                                    data-md-container-class="selectdemoSelectHeader" required ng-change="GetAllSim()">
                                    <md-select-header class="demo-select-header">
                                        <input ng-model="vm.searchTermidAppName" type="search"
                                            placeholder="Search for a APP Name.." class="demo-header-searchbox md-text"
                                            ng-keydown="onSearchChange($event)">
                                    </md-select-header>
                                    <md-option ng-value="o.id"
                                        ng-repeat="o in lstAppInfo | filter:vm.searchTermidAppName track by o.id">
                                        {{o.AppName}}</md-option>
                                </md-select>
                                <div ng-messages="formTrackingdetails.AppName.$error"

                                    <div ng-message="required">
                                        <span>App Name is required.</span>
                                    </div>
                                </div>

                            <md-input-container class="md-block" flex="100" flex-gt-sm="50" flex-gt-md="33">
                                <label>Old SIM</label>
                                <md-select Name="old" ng-model="model.OldSim" md-on-close="clearSearchTerm()"
                                    data-md-container-class="selectdemoSelectHeader" ng-required="true">
                                    <md-select-header class="demo-select-header">
                                        <input ng-model="vm.searchTermOldsim" type="search"
                                            placeholder="Search for a Old SIM.." class="demo-header-searchbox md-text"
                                            ng-keydown="onSearchChange($event)">
                                    </md-select-header>
                                    <md-option value="{{o.SerialNum}}"
                                        ng-repeat="o in lstsim |filter:vm.searchTermOldsim | orderBy: 'SerialNum'">
                                        {{o.SerialNum}}</md-option>
                                </md-select>
                                <div ng-messages="Formwarranty.old.$error" ng-if="Formwarranty.old.$touched">
                                    <div ng-message="required">Please select Old Device</div>
                                </div>

                            </md-input-container>
                            <md-input-container class="md-block" flex-gt-sm="50" flex-gt-md="33">
                                <label>New SIM</label>
                                <md-select Name="new" ng-model="model.NewSim" md-on-close="clearSearchTerm()"
                                    data-md-container-class="selectdemoSelectHeader" ng-required="true">
                                    <md-select-header class="demo-select-header">
                                        <input ng-model="vm.searchTermnewsim" type="search"
                                            placeholder="Search for a new SIM.." class="demo-header-searchbox md-text"
                                            ng-keydown="onSearchChange($event)">
                                    </md-select-header>
                                    <md-option value="{{o.SerialNum}}"
                                        ng-repeat="o in lstsim |filter:vm.searchTermnewsim | orderBy: 'SerialNum'">
                                        {{o.SerialNum}}</md-option>
                                </md-select>
                                <div ng-messages="Formwarranty.new.$error" ng-if="Formwarranty.new.$touched">
                                    <div ng-message="required">Please Select New device</div>
                                </div>
                            </md-input-container>

                            <div align="left" style="margin-top:100px;margin-left:50px">
                                <md-button class="md-raised md-primary" ng-disabled="!Formwarranty.$valid"
                                    ng-click="Createwarrantyreplace(model)">Save</md-button>
                                <md-button class="md-accent md-raised" ng-click="ResetData()">Reset</md-button>
                                <md-button class="md-raised md-warn" ng-click="cancel()">Cancel</md-button>
                            </div>
                        </div>
                </form>
            </md-content>
        </div>
    </div>
