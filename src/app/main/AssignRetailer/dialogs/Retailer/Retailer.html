<md-dialog class="flex-50">

    <md-toolbar class="md-accent md-hue-2">
        <div class="md-toolbar-tools">
            <h2>{{Email}} Agent's Retailer</h2>
            <span flex></span>
            <md-button class="md-icon-button" ng-click="closeModel()">
                <md-icon md-font-icon="icon-close" aria-label="Close dialog"></md-icon>
            </md-button>
        </div>
    </md-toolbar>
    <md-dialog-content>
        <ms-form-wizard flex>
            <table class="dataTable row-border hover" datatable="ng" dt-options="dtOptions" dt-column-defs="vm.dtColumnDefs">
                <thead>
                    <tr>
                        <th class="all">
                            <div class="table-header">
                                <span class="column-title">No</span>
                            </div>
                        </th>
                        <th class="secondary-text">
                            <div class="table-header">
                                <span class="column-title">Email</span>
                            </div>
                        </th>
                        <th class="secondary-text">
                            <div class="table-header">
                                <span class="column-title">Phone</span>
                            </div>
                        </th>
                        <th class="secondary-text">
                            <div class="table-header">
                                <span class="column-title">Country</span>
                            </div>
                        </th>
                        <th class="all">
                            <div class="table-header">
                                <span class="column-title">Assign Retailer</span>

                            </div>
                        </th>
                    </tr>
                </thead>
                <tbody>
                    <tr ng-repeat="o in finalRetailerList">
                        <td>{{ $index+1 }}</td>
                        <td>{{ o.email }}</td>
                        <td>{{ o.phone }}</td>
                        <td>{{ o.country }}</td>
                        <td>
                            <md-checkbox md-no-ink aria-label="Checkbox No Ink" ng-model="o.IsRetailer" ng-change="AssignRetailer(o)" class="md-primary"></md-checkbox>
                        </td>
                    </tr>
                </tbody>
            </table>
        </ms-form-wizard>
    </md-dialog-content>
</md-dialog>
