<md-content>
    <div id="simple-table" class="page-layout simple fullwidth doc-page element-doc-page">
        <div class="header md-accent-bg layout-align-space-between-stretch layout-row" layout="row" layout-align="space-between">
            <div layout="column" layout-align="center start" class="layout-align-center-start layout-column">
                <div class="breadcrumb layout-align-start-center layout-row" layout="row" layout-align="start center">
                    <md-icon md-font-icon="icon-home" class="s16 ng-isolate-scope md-font icon-home material-icons md-default-theme" aria-hidden="true"></md-icon>
                    <md-icon md-font-icon="icon-chevron-right" class="s16 separator ng-isolate-scope md-font icon-chevron-right material-icons md-default-theme" aria-hidden="true"></md-icon><span class="parent">Customer</span>
                </div>
                <div class="title">Customer</div>
            </div>
        </div>
        <div class="content">
            <div class="white-bg md-whiteframe-4dp">
                <md-tabs md-selected="tab.selectedIndex" md-dynamic-height md-border-bottom>
                    <md-tab label="Customer List" ng-click="ResetEdit()">
                        <div id="simple-table" class="page-layout simple fullwidth doc-page element-doc-page">
                            <div class="content custom-content">
                                <table class="dataTable row-border hover" datatable="" dt-instance="dtInstance" dt-columns="dtColumns" dt-options="dtOptions">
                                    <thead>
                                        <tr>
                                            <th class="all">
                                                <div class="table-header">
                                                    <span class="column-title">No</span>
                                                </div>
                                            </th>
                                            <th class="secondary-text">
                                                <div class="table-header">
                                                    <span class="column-title">Customer Name</span>
                                                </div>
                                            </th>
                                            <th class="secondary-text">
                                                <div class="table-header">
                                                    <span class="column-title">User Name</span>
                                                </div>
                                            </th>
                                            <th class="secondary-text">
                                                <div class="table-header">
                                                    <span class="column-title">Email</span>
                                                </div>
                                            </th>
                                            <th class="secondary-text">
                                                <div class="table-header">
                                                    <span class="column-title">Phone</span>
                                                </div>
                                            </th>
                                            <th class="secondary-text">
                                                <div class="table-header">
                                                    <span class="column-title">Country</span>
                                                </div>
                                            </th>
                                            <!-- <th class="secondary-text">
                                                <div class="table-header">
                                                    <span class="column-title">OTP</span>
                                                </div>
                                            </th>
                                            <th class="secondary-text">
                                                <div class="table-header">
                                                    <span class="column-title">Verified</span>
                                                </div>
                                            </th> -->
                                            <th class="all">
                                                <div class="table-header" align="justify">
                                                    <span class="column-title">Action</span>
                                                </div>
                                            </th>
                                        </tr>
                                    </thead>
                                    <!--  <tbody>
                                     <tr ng-repeat="item in lstUsers">
                                     <td>{{$index+1}}</td>
                                    <td>{{item.username}}</td>
                                    <td>{{item.email}}</td>
                                    <td >{{item.phone}}</td>
                                     <td >{{item.tbluserinroles[0].tblrole.RoleName}}</td>
                                    <td>
                                        <md-button class="md-icon-button md-accent md-raised md-hue-2" ng-click="FetchRoleById(item)">
                                            <md-icon md-font-icon="icon-pencil-box-outline"></md-icon>
                                        </md-button>


                                    </td>
                                </tr>
                                </tbody> -->
                                </table>
                            </div>
                        </div>
                    </md-tab>
                </md-tabs>
            </div>
        </div>
    </div>
</md-content>
