<md-dialog class="task-dialog" aria-label="New Task">
    <md-toolbar class="md-accent md-hue-2">
        <div class="md-toolbar-tools" layout="row" layout-align="space-between">
            <span class="title">Import Trackers From Excel</span>
            <md-button class="md-icon-button" ng-click="closeModel()">
                <md-icon md-font-icon="icon-close" aria-label="Close dialog"></md-icon>
            </md-button>
        </div>
    </md-toolbar>
    <md-dialog-content ms-scroll>
        <md-content class="widget-page">
            <md-content>
                <form Name="formImport" class="md-inline-form">
                    <md-content class="md-padding">
                        <div layout-gt-sm="row">
                            <md-input-container flex="100" flex-gt-xs="50">
                                <label>Type</label>
                                <!-- <input type="text" name="state" ng-model="model.state" required maxlength="50"> -->
                                <md-select ng-model="model.Type" name="Type">
                                    <md-option name="Type1" value="M2" selected="true">M2</md-option>
                                    <md-option name="Type2" value="M2-U">C2</md-option>
                                    <!-- <md-option name="Type3" value="Petrover">Petrover</md-option> -->
                                </md-select>
                            </md-input-container>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;
                           <!--  <md-input-container class="md-block" flex>
                                <md-checkbox ng-model="model.IsOldDevice" aria-label="Checkbox 1" class="md-primary" ng-true-value="1" ng-false-value="0">
                                    Is OldDevice
                                </md-checkbox>
                            </md-input-container> -->
                            <md-input-container class="md-block" flex-gt-sm="50">
                                <label>Carrier </label>
                                <md-select name="CarrierId" ng-model="model.CarrierId">
                                    <md-option ng-repeat="o in lstCarrier" value="{{o.id}}">{{o.Name}}</md-option>
                                </md-select>
                                <!-- <div ng-messages="FormManageTrackers.CarrierId.$error" ng-if="FormManageTrackers.CarrierId.$touched">
                                            <div ng-message="required">
                                                <span>Carrier is required</span>
                                            </div>
                                        </div> -->
                            </md-input-container>
                        </div>
                        <div layout-gt-sm="row">
                            
                            <md-input-container class="md-block" flex-gt-sm="50">
                                <label>Country *</label>
                                <md-select name="CountryId" ng-model="model.CountryId">
                                    <md-option ng-repeat="o in lstCountry" value="{{o.id}}">{{o.Country}}</md-option>
                                </md-select>
                                <!-- <div ng-messages="FormManageTrackers.CountryId.$error" ng-if="FormManageTrackers.CountryId.$touched">
                                            <div ng-message="required">
                                                <span>Country is required</span>
                                            </div> -->
                        </div>
                        <p>You must upload file same as excel template for Import Trackers .
                            <br/>
                            <!-- <small>you can download excel template for import excel file.</small> -->
                        </p>
                        <lf-ng-md-file-input name="files1" lf-files="Productfiles" lf-mimetype="application/vnd.openxmlformats-officedocument.spreadsheetml.sheet" lf-required lf-maxcount="1" lf-api="apiReset" lf-filesize="10MB" ng-click="Reset()"></lf-ng-md-file-input>
                        <div ng-messages="formImport.files1.$error" style="color:red;">
                            <div ng-message="required">You must Select file.</div>
                            <div ng-message="maxcount">Too much files.</div>
                            <div ng-message="filesize">File size too large.</div>
                            <div ng-message="mimetype">Only Excel File Supported.</div>
                        </div>
                    </md-content>
                    <div align="left">
                        <md-button class="md-raised md-primary" ng-disabled="!formImport.$valid" ng-click="Import(model)">Import</md-button>
                        <md-button class="md-raised md-warn" ng-click="closeModel()">Close Model</md-button>
                    </div>
                </form>
            </md-content>
    </md-dialog-content>
</md-dialog>
