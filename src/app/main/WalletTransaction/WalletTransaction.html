<div id="e-commerce-products" class="page-layout carded fullwidth" layout="row" ng-if="!flag">
    <div class="top-bg md-accent-bg"></div>
    <div class="center" layout="column" flex>
        <div class="header" layout="row" layout-wrap layout-align="space-between center">
            <div class="white-fg" layout="row" layout-gt-xs="row" layout-gt-sm="column" layout-align="start start">
                <div class="h1" layout="row" layout-align="start center">
                    <md-icon md-font-icon="icon-cube-outline"></md-icon>
                    <span translate="Wallet Transaction">Wallet Transaction</span>
                </div>
                <!-- <div class="product-count secondary-text" hide-xs>
                    <span>Total Wallet :</span>
                    <b>{{recordsTotal}}</b>
                </div> -->
            </div>
            <div class="search" layout="row" layout-align="start center" flex="60" flex-gt-xs="60" flex-gt-sm="33" align="center">
                <md-icon md-font-icon="icon-magnify" class="white-text icon search-icon"></md-icon>
                <input id="modelsearch" ng-model="modelSearch.Search" ng-change="GetSerch(modelSearch.Search)" class="search-input" type="text" placeholder="Search" translate translate-attr-placeholder="SEARCH" flex>
            </div>
            <div flex="40" flex-gt-xs="40" flex-gt-sm="33" layout="row" layout-align="end center">

                <div ng-if="FlgAddedEditlocal">
                    <md-button class="md-raised md-background" ng-click="ResetModel()">
                        <span translate="Wallet Transaction">Wallet Transaction</span>
                    </md-button>
                </div>
            </div>
        </div>
        <div class="content-card" layout="column" flex>
            <div class="content fullpage-datatable" layout="column" flex>
                <table id="WalletTransaction" class="dataTable row-border hover" datatable="" dt-instance="dtUserInstance" dt-columns="dtUserColumns" dt-options="dtUsercustomOptions">
                    <thead>
                        <tr>
                            <th class="all">
                                <div class="table-header">
                                    <span class="column-title"> No</span>
                                </div>
                            </th>
                            <th class="secondary-text">
                                <div class="table-header">
                                    <span class="column-title">OrderNumber</span>
                                </div>
                            </th>
                            <th class="secondary-text">
                                <div class="table-header">
                                    <span class="column-title">App Name</span>
                                </div>
                            </th>
                            <th class="secondary-text">
                                <div class="table-header">
                                    <span class="column-title">Amount</span>
                                </div>
                            </th>
                            <th class="secondary-text">
                                <div class="table-header">
                                    <span class="column-title">Type</span>
                                </div>
                            </th>
                            <th class="secondary-text">
                                <div class="table-header">
                                    <span class="column-title">Remark</span>
                                </div>
                            </th>
                            <th class="secondary-text">
                                <div class="table-header">
                                    <span class="column-title">Status</span>
                                </div>
                            </th>
                            <th class="secondary-text">
                                <div class="table-header">
                                    <span class="column-title">Createdby</span>
                                </div>
                            </th>
                            <th class="secondary-text">
                                <div class="table-header">
                                    <span class="column-title">CreatedDate</span>
                                </div>
                            </th>
                            <th class="secondary-text">
                                <div class="table-header">
                                    <span class="column-title">ExpiryDate</span>
                                </div>
                            </th>
                            <th class="all">
                                <div class="table-header">
                                    <span class="column-title">Action</span>
                                </div>
                            </th>
                        </tr>
                    </thead>
                </table>
            </div>
        </div>
    </div>
</div>
<div class="page-layout simple tabbed" layout="column" ng-show="flag">
    <div class="header md-accent-bg" layout="row" layout-align="start center">
        <!--  <div class="white-fg" layout="row" layout-align="start center" flex>
            <md-button class="goto-products-button md-icon-button" aria-label="Go to WalletList" ng-click="gotoWalletList()">
                <md-icon md-font-icon="icon-arrow-left"></md-icon>
            </md-button>
            <div layout="row" layout-align="start center">
                <div layout="column" layout-align="start start">
                    <div class="subtitle secondary-text">
                        <span translate="Wallet List">Wallet List</span>
                    </div>
                </div>
            </div>
        </div> -->
        <div class="white-fg" layout="row" layout-gt-xs="row" layout-gt-sm="column" layout-align="start start">
            <div class="h1" layout="row" layout-align="start center">
                <md-icon md-font-icon="icon-cube-outline"></md-icon>
                <span translate="Wallet Transaction">Wallet Transaction</span>
            </div>
        </div>
    </div>
    <div class="content" layout-margin>
        <div class="product-detail-form-container md-background-bg md-whiteframe-1dp">
            <form name="formWalletTransaction" novalidate class="ms-stepper" aria-invalid="false" style="padding: 24px">
                <div layout="row" layout-wrap>
                    <md-input-container flex="100" flex-gt-xs="50" flex-gt-sm="50" ng-if="IsShow">
                        <label>App Info</label>
                        <md-select Name="AppName" ng-model="model.idApp" md-on-close="clearSearchTerm()" data-md-container-class="selectdemoSelectHeader" ng-required="true">
                            <md-select-header class="demo-select-header">
                                <input ng-model="searchdropdown.searchAppInfo" type="search" placeholder="Search for a User.." class="demo-header-searchbox md-text" ng-keydown="onSearchChange($event)">
                            </md-select-header>
                            <md-option ng-value="{{o.id}}" ng-repeat="o in lstAppInfo |filter:searchdropdown.searchAppInfo| orderBy: 'AppName'">{{o.AppName}}</md-option>
                        </md-select>
                        <div ng-messages="formWalletTransaction.AppName.$error" ng-if="formWalletTransaction.AppName.$touched">
                            <div ng-message="required">
                                <span>App Name is required</span>
                            </div>
                        </div>
                    </md-input-container>
                    <!-- <md-input-container flex="100" flex-gt-xs="50" flex-gt-sm="50">
                        <label>Transaction</label>
                        <md-select Name="idChair" ng-model="model.Type" data-md-container-class="selectdemoSelectHeader">
                            <md-option value="Credit">Credit</md-option>
                            <md-option value="Debit">Debit</md-option>
                        </md-select>
                    </md-input-container> -->
                    <md-input-container class="md-block" flex="100" flex-gt-xs="50" flex-gt-sm="50">
                        <label>Amount </label>
                        <input name="Amount" type="number" ng-model="model.Amount" ng-required="true" min="0">
                        <div ng-messages="formWalletTransaction.Amount.$error" ng-if="formWalletTransaction.Amount.$touched">
                            <div ng-message="required">
                                <span>Amount is required</span>
                            </div>
                        </div>
                    </md-input-container>
                    <md-input-container class="md-block" flex="100" flex-gt-xs="50" flex-gt-sm="50">
                        <label>Remark </label>
                        <input name="Remark" type="text" ng-model="model.Remark" maxlength="300" md-maxlength="300">
                    </md-input-container>
                </div>
                <div ng-show="FlgImage" class="row" flex="100" flex-gt-xs="100">
                    <md-input-container flex="100" flex-gt-xs="100" flex-gt-sm="50">
                        <div ng-if="model.PaymentReceipt != '' && model.PaymentReceipt != null">
                            <img ng-src="{{RoutePath}}MediaUploads/WalletReceipt/{{model.PaymentReceipt}}" id="UploadedImage" err-src="assets/images/no-image.png" width="150px" />
                            <br />
                        </div>
                        <md-button class="md-raised md-primary" ng-click="RemoveImage()">Remove</md-button>
                    </md-input-container>
                </div>
                <div layout="row" flex="100" flex-gt-sm="100" flex-gt-md="50">
                    <label>Image</label>
                    <md-input-container class="md-block" flex>
                        <lf-ng-md-file-input id="fileInput" name="files00" lf-files="Mediafiles" lf-api="apiMedia" lf-mimetype="image/*" preview base-sixty-four-input></lf-ng-md-file-input>
                        <div ng-messages="formWalletTransaction.files00.$error" style="color:red;">
                            <div ng-message="mimetype">Only image file supported</div>
                        </div>
                    </md-input-container>
                </div>
                <div align="center">
                    <md-button class="md-raised md-primary" ng-click="CreateWallet(model)" ng-disabled="!vm.isFormValid('formWalletTransaction')">
                        <span translate="SAVE">SAVE</span>
                    </md-button>
                    <md-button class="md-raised md-warn" ng-click="ResetModel()">Cancel</md-button>
                </div>
            </form>
        </div>
    </div>
</div>
