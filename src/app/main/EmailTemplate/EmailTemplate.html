<md-content>
    <div id="simple-table" class="page-layout simple fullwidth doc-page element-doc-page">
        <div class="header md-accent-bg layout-align-space-between-stretch layout-row" layout="row" layout-align="space-between">
            <div layout="column" layout-align="center start" class="layout-align-center-start layout-column">
                <div class="breadcrumb layout-align-start-center layout-row" layout="row" layout-align="start center">
                    <md-icon md-font-icon="icon-home" class="s16 ng-isolate-scope md-font icon-home material-icons md-default-theme" aria-hidden="true"></md-icon>
                    <md-icon md-font-icon="icon-chevron-right" class="s16 separator ng-isolate-scope md-font icon-chevron-right material-icons md-default-theme" aria-hidden="true"></md-icon><span class="parent">Email Template </span></div>
                <div class="title">Email Template</div>
            </div>
        </div>
        <div class="content">
            <div class="white-bg md-whiteframe-4dp">
                <md-tabs md-selected="tab.selectedIndex" md-dynamic-height md-border-bottom>
                    <md-tab label="Email Template">
                        <div id="simple-table" class="page-layout simple fullwidth doc-page element-doc-page">
                            <div class="content custom-content">
                                <table class="dataTable row-border hover" datatable="ng" dt-options="vm.dtOptions" dt-column-defs="vm.dtColumnDefs">
                                    <thead>
                                        <tr>
                                            <th class="all">
                                                <div class="table-header">
                                                    <span class="column-title">No</span>
                                                </div>
                                            </th>
                                            <th class="secondary-text">
                                                <div class="table-header">
                                                    <span class="column-title">Email From</span>
                                                </div>
                                            </th>
                                            <th class="secondary-text">
                                                <div class="table-header">
                                                    <span class="column-title">Type</span>
                                                </div>
                                            </th>
                                            <th class="secondary-text">
                                                <div class="table-header">
                                                    <span class="column-title">Email Subject</span>
                                                </div>
                                            </th>
                                            <!--  <th class="secondary-text">
                                    <div class="table-header">
                                        <span class="column-title">Email Body</span>
                                    </div>
                                </th> -->
                                            <th class="all">
                                                <div class="table-header">
                                                    <span class="column-title">Action</span>
                                                </div>
                                            </th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        <tr ng-repeat="o in lstEmailTemplate">
                                            <td>{{ $index+1 }}</td>
                                            <td>{{ o.EmailFrom }}</td>
                                            <td>{{ o.Type }}</td>
                                            <td>{{ o.EmailSubject }}</td>
                                            <!-- <td ng-bind-html="o.EmailBody"></td> -->
                                            <td>
                                                <md-button class="md-icon-button md-accent md-raised md-hue-2" ng-if="FlgModifiedAccess" ng-click="FetchEmailTemplate($event,o)">
                                                    <md-icon md-font-icon="icon-pencil-box-outline"></md-icon>
                                                </md-button>
                                            </td>
                                        </tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </md-tab>
                    <!-- <md-tab label="Manage Category" ng-click="ResetEdit()">
                        <md-content class="md-padding">
                            <div>
                                
                            </div>
                        </md-content>
                    </md-tab> -->
                </md-tabs>
            </div>
        </div>
    </div>
</md-content>
