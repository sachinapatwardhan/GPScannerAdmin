<div id="e-commerce-products" class="page-layout carded fullwidth" layout="row" ng-show="!flag">
    <div class="top-bg md-accent-bg"></div>
    <div class="center" layout="column" flex>
        <div class="header" layout="row" layout-wrap layout-align="space-between center">
            <div class="white-fg" layout="row" layout-gt-xs="row" layout-gt-sm="column" layout-align="start start">
                <div class="h1" layout="row" layout-align="start center">
                    <md-icon md-font-icon="icon-cube-outline"></md-icon>
                    <span translate="Email Template">Email Template</span>
                </div>
            </div>
            <div class="search" layout="row" layout-align="start center" flex="60" flex-gt-xs="60" flex-gt-sm="33" align="center">
                <md-icon md-font-icon="icon-magnify" class="white-text icon search-icon"></md-icon>
                <input id="search" ng-model="modelSearch.Search" ng-change="GetSerch(modelSearch.Search)" class="search-input" type="text" placeholder="Search" translate translate-attr-placeholder="SEARCH" flex>
            </div>
            <div flex="40" flex-gt-xs="40" flex-gt-sm="33" layout="row" layout-align="end center">

                <div ng-if="FlgAddedEditlocal">
                    <md-button class="md-icon-button  md-raised md-hue-2" ng-click="FetchEmailTemplate($event)" aria-label="Search ">
                        <md-icon md-font-icon="icon-plus "></md-icon>
                        <md-tooltip md-visible=" " md-direction=" ">Add New Email Template</md-tooltip>
                    </md-button>
                </div>
            </div>
        </div>
        <div class="content-card " layout="column " flex>
            <div class="content fullpage-datatable " layout="column " flex>
                <!-- <div class="content"> -->
                <!-- <div class="white-bg md-whiteframe-4dp"> -->
                <!-- <md-tabs md-selected="tab.selectedIndex" md-dynamic-height md-border-bottom> -->
                <!-- <md-tab label="Email Template"> -->
                <!-- <div id="simple-table" class="page-layout simple fullwidth doc-page element-doc-page"> -->
                <!-- <div class="content custom-content"> -->
                <table class="dataTable cell-border row-border hover" datatable="ng" dt-instance="dtInstance" dt-options="vm.dtOptions" dt-column-defs="vm.dtColumnDefs">
                    <thead>
                        <tr>
                            <th class="all">
                                <div class="table-header">
                                    <span class="column-title">No</span>
                                </div>
                            </th>
                            <th class="secondary-text">
                                <div class="table-header">
                                    <span class="column-title">Email From</span>
                                </div>
                            </th>
                            <th class="secondary-text">
                                <div class="table-header">
                                    <span class="column-title">Type</span>
                                </div>
                            </th>
                            <th class="secondary-text">
                                <div class="table-header">
                                    <span class="column-title">Email Subject</span>
                                </div>
                            </th>
                            <!--  <th class="secondary-text">
                                    <div class="table-header">
                                        <span class="column-title">Email Body</span>
                                    </div>
                                </th> -->
                            <th class="all">
                                <div class="table-header">
                                    <span class="column-title">Action</span>
                                </div>
                            </th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr ng-repeat="o in lstEmailTemplate">
                            <td>{{ $index+1 }}</td>
                            <td>{{ o.EmailFrom }}</td>
                            <td>{{ o.Type }}</td>
                            <td>{{ o.EmailSubject }}</td>
                            <!-- <td ng-bind-html="o.EmailBody"></td> -->
                            <td>
                                <md-button class="edit-button md-icon-button " ng-if="FlgModifiedAccess" ng-click="FetchEmailTemplate($event,o)">
                                    <md-icon md-font-icon="icon-pencil " class="s18 green-500-fg "></md-icon>
                                    <md-tooltip md-visible=" " md-direction=" ">Edit</md-tooltip>
                                </md-button>
                                <md-button class="edit-button md-icon-button " ng-click="DeleteEmailTemplate(o.id) ">
                                    <md-icon md-font-icon="icon-trash " class="s18 red-500-fg "></md-icon>
                                    <md-tooltip md-visible=" " md-direction=" ">Delete</md-tooltip>
                                </md-button>
                            </td>
                        </tr>
                    </tbody>
                </table>
                <!-- </div> -->
                <!-- </div> -->
                <!-- </md-tab> -->
                <!-- <md-tab label="Manage Category" ng-click="ResetEdit()">
                        <md-content class="md-padding">
                            <div>
                                
                            </div>
                        </md-content>
                    </md-tab> -->
                <!-- </md-tabs> -->
                <!-- </div> -->
                <!-- </div> -->
            </div>
        </div>
    </div>
