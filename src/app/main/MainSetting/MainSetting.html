<div id="e-commerce-products" class="page-layout carded fullwidth" layout="row" ng-show="!flag">
    <div class="top-bg md-accent-bg"></div>
    <div class="center" layout="column" flex>
        <div class="header" layout="row" layout-wrap layout-align="space-between center">
            <div class="white-fg" layout="row" layout-gt-xs="row" layout-gt-sm="column" layout-align="start start">
                <div class="h1" layout="row" layout-align="start center">
                    <md-icon md-font-icon="icon-cube-outline"></md-icon>
                    <span translate="Setting">Setting</span>
                </div>
            </div>
            <div class="search" layout="row" layout-align="start center" flex="60" flex-gt-xs="60" flex-gt-sm="33" align="center">
                <md-icon md-font-icon="icon-magnify" class="white-text icon search-icon"></md-icon>
                <input id="modelsearch" ng-model="Search" ng-change="GetSerch(Search)" class="search-input" type="text" placeholder="Search" translate translate-attr-placeholder="SEARCH" flex>
            </div>
            <div flex="40" flex-gt-xs="40" flex-gt-sm="33" layout="row" layout-align="end center">

                <div ng-if="FlgAddedEditlocal">
                    <md-button class="md-icon-button  md-raised md-hue-2" ng-click="Reset()" aria-label="Search ">
                        <md-icon md-font-icon="icon-plus "></md-icon>
                        <md-tooltip md-visible=" " md-direction=" ">Add New Setting</md-tooltip>
                    </md-button>
                </div>
            </div>
        </div>
        <div class="content-card " layout="column " flex>
            <div class="content fullpage-datatable " layout="column " flex>
                <!--<table id="AppInfo " class="dataTable row-border hover " datatable=" " dt-instance="dtInstance " dt-columns="dtColumns " dt-options="dtOptions " width="100% ">-->
                <!--<table class="dataTable cell-border row-border hover " datatable="ng " dt-options="dtCustomOptions " dt-instance="dtInstance " dt-column-defs="vm.dtColumnDefs " width="100% ">-->
                <table class="dataTable row-border hover " datatable="ng " dt-instance="dtInstance " dt-options="dtOptions " dt-column-defs="dtColumnDefs ">
                    <thead>
                        <tr>
                            <th class="all ">
                                <div class="table-header ">
                                    <span class="column-title ">No</span>
                                </div>
                            </th>
                            <th class="secondary-text ">
                                <div class="table-header ">
                                    <span class="column-title ">Name</span>
                                </div>
                            </th>
                            <th class="secondary-text ">
                                <div class="table-header ">
                                    <span class="column-title ">Value</span>
                                </div>
                            </th>

                            <th class="all ">
                                <div class="table-header ">
                                    <span class="column-title ">Action</span>
                                </div>
                            </th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr ng-repeat="o in lstSetting ">
                            <td>{{ $index+1 }}</td>
                            <td>{{o.Name}} </td>
                            <td>{{o.Value}} </td>
                            <td>
                                <md-button class="edit-button md-icon-button " ng-click="editSettingById(o)">
                                    <md-icon md-font-icon="icon-pencil " class="s18 green-500-fg "></md-icon>
                                    <md-tooltip md-visible=" " md-direction=" ">Edit</md-tooltip>
                                </md-button>
                                <md-button class="edit-button md-icon-button " ng-click="DeleteSetting(o.Name)">
                                    <md-icon md-font-icon="icon-trash " class="s18 red-500-fg "></md-icon>
                                    <md-tooltip md-visible=" " md-direction=" ">Delete</md-tooltip>
                                </md-button>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
<div class="page-layout simple tabbed " layout="column " ng-show="flag ">
    <div class="header md-accent-bg " layout="row " layout-align="start center ">
        <div class="white-fg " layout="row " layout-align="start center " flex>
            <md-button class="goto-products-button md-icon-button " aria-label="Go to Vehicle " ng-click="ResetModel() ">
                <md-icon md-font-icon="icon-arrow-left "></md-icon>
            </md-button>
            <div layout="row " layout-align="start center ">
                <div layout="column " layout-align="start start ">
                    <div class="subtitle secondary-text ">
                        <span translate="Setting">Setting</span>
                    </div>
                </div>
            </div>
        </div>
        <div>
        </div>
    </div>
    <div class="content " layout-margin>
        <div class="product-detail-form-container md-background-bg md-whiteframe-1dp ">
            <md-content class="md-padding ">
                <form name="formSetting " novalidate class="md-inline-form " aria-invalid="false ">
                    <div class="content ">
                        <div layout="row " layout-wrap>
                            <md-input-container class="md-block " flex="100 " flex-gt-sm="25 ">
                                <label>Name</label>
                                <input type="text " name="Name" ng-model="model.Name" required ng-disabled="model.id==1">
                                <div ng-messages="formSetting.Name.$error " ng-if="formSetting.Name.$touched " role="alert ">
                                    <div ng-message="required ">
                                        <span>Name field is required</span>
                                    </div>
                                </div>
                            </md-input-container>
                            <md-input-container class="md-block " flex="100 " flex-gt-sm="25 ">
                                <label>Value</label>
                                <input type="text " name="Value " ng-model="model.Value " required>
                                <div ng-messages="formSetting.Value.$error " ng-if="formSetting.Value.$touched " role="alert ">
                                    <div ng-message="required ">
                                        <span>Value field is required</span>
                                    </div>
                                </div>
                            </md-input-container>
                        </div>


                        <div align="left ">
                            <md-button class="md-raised md-primary " ng-disabled="!formSetting.$valid " ng-click="SaveSetting(model) ">Save</md-button>
                            <md-button class="md-accent md-raised " ng-click="Reset() ">Reset</md-button>
                            <md-button class="md-raised md-warn " ng-click="ResetModel() ">Cancel</md-button>
                        </div>
                    </div>
                </form>
            </md-content>
        </div>
    </div>
</div>
