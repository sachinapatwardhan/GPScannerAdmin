<md-content>
  <div id="simple-table" class="page-layout simple fullwidth doc-page element-doc-page">
    <div class="header md-accent-bg layout-align-space-between-stretch layout-row" layout="row" layout-align="space-between">
      <div layout="column" layout-align="center start" class="layout-align-center-start layout-column">
        <div class="breadcrumb layout-align-start-center layout-row" layout="row" layout-align="start center">
          <md-icon md-font-icon="icon-home" class="s16 ng-isolate-scope md-font icon-home material-icons md-default-theme" aria-hidden="true"></md-icon>
          <md-icon md-font-icon="icon-chevron-right" class="s16 separator ng-isolate-scope md-font icon-chevron-right material-icons md-default-theme" aria-hidden="true"></md-icon><span class="parent">Gps</span>
        </div>
        <div class="title">Gps</div>
      </div>
    </div>
    <div class="content">
      <div class="white-bg md-whiteframe-4dp">
        <md-tabs md-selected="tab.selectedIndex" md-dynamic-height md-border-bottom>
          <md-tab label="Gps List" ng-click="ResetEdit()">
            <div id="simple-table" class="page-layout simple fullwidth doc-page element-doc-page">
              <div class="content">
                <div layout="row" class="custom-content">
                  <md-input-container flex="100" flex-gt-xs="25">
                    <label>Start Date</label>
                    <input name="Start" mdc-datetime-picker date="true" time="false" type="text" id="time" min-date="minDate" format="DD-MM-YYYY" ng-model="ModelSearch.StartDate">
                  </md-input-container>
                  <md-input-container flex="100" flex-gt-xs="25">
                    <label>End Date</label>
                    <input name="End" mdc-datetime-picker date="true" time="false" type="text" id="time" min-date="minDate" format="DD-MM-YYYY" ng-model="ModelSearch.EndDate">
                  </md-input-container>
                  <md-input-container flex="100" flex-gt-xs="25">
                    <label>DeviceId</label>
                    <md-select name="DeviceId" ng-model="ModelSearch.DeviceId">
                      <md-option ng-repeat="o in lstdevice" value="{{o.DeviceId}}">{{o.DeviceId}}</md-option>
                    </md-select>
                  </md-input-container>
                  <div flex="100" flex-gt-xs="25">
                    <md-button class="md-icon-button md-accent md-raised md-hue-2" ng-click="GetAllGpsData(true)" aria-label="Search">
                      <md-icon md-font-icon="icon-magnify"></md-icon>
                      <md-tooltip md-visible="" md-direction="">Search </md-tooltip>
                    </md-button>
                    <md-button class="md-icon-button md-warn md-raised md-hue-2" ng-click="SearchReset()" aria-label="Reset Search">
                      <md-icon md-font-icon="icon-refresh"></md-icon>
                      <md-tooltip md-visible="" md-direction="">Reset Search </md-tooltip>
                    </md-button>
                  </div>
                </div>
                <div class="content" layout="column">
                  <table class="dataTable dataTable row-border hover" datatable="" dt-instance="dtInstance" dt-columns="dtColumns" dt-options="dtOptions">
                    <thead>
                      <tr>
                        <th class="all">
                          <div class="table-header">
                            <span class="column-title">No</span>
                          </div>
                        </th>
                        <th class="secondary-text">
                          <div class="table-header">
                            <span class="column-title">DeviceId</span>
                          </div>
                        </th>
                        <th class="secondary-text">
                          <div class="table-header">
                            <span class="column-title">Datetime</span>
                          </div>
                        </th>
                        <th class="secondary-text">
                          <div class="table-header">
                            <span class="column-title">Latitude</span>
                          </div>
                        </th>
                        <th class="secondary-text">
                          <div class="table-header">
                            <span class="column-title">Longtitude</span>
                          </div>
                        </th>
                        <th class="secondary-text">
                          <div class="table-header">
                            <span class="column-title">GPSPositioning</span>
                          </div>
                        </th>
                        <th class="secondary-text">
                          <div class="table-header">
                            <span class="column-title">Speed</span>
                          </div>
                        </th>
                        <th class="secondary-text">
                          <div class="table-header">
                            <span class="column-title">Direction</span>
                          </div>
                        </th>
                        <th class="secondary-text">
                          <div class="table-header">
                            <span class="column-title">Status</span>
                          </div>
                        </th>
                        <th class="secondary-text">
                          <div class="table-header">
                            <span class="column-title">IsRelayToStopTheCar</span>
                          </div>
                        </th>
                        <th class="secondary-text">
                          <div class="table-header">
                            <span class="column-title">IsSirenSound</span>
                          </div>
                        </th>
                        <th class="secondary-text">
                          <div class="table-header">
                            <span class="column-title">IsLockTheDoor</span>
                          </div>
                        </th>
                        <th class="secondary-text">
                          <div class="table-header">
                            <span class="column-title">IsUnlockTheDoor</span>
                          </div>
                        </th>
                        <th class="secondary-text">
                          <div class="table-header">
                            <span class="column-title">IsSOS</span>
                          </div>
                        </th>
                        <th class="secondary-text">
                          <div class="table-header">
                            <span class="column-title">IsDoor</span>
                          </div>
                        </th>
                        <th class="secondary-text">
                          <div class="table-header">
                            <span class="column-title">IsEngine</span>
                          </div>
                        </th>
                        <th class="secondary-text">
                          <div class="table-header">
                            <span class="column-title">CreatedDate</span>
                          </div>
                        </th>
                      </tr>
                    </thead>
                  </table>
                </div>
              </div>
            </div>
          </md-tab>
        </md-tabs>
      </div>
    </div>
  </div>
</md-content>
