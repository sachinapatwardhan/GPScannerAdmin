<div id="e-commerce-products" class="page-layout carded fullwidth" layout="row">
    <div class="top-bg md-accent-bg"></div>
    <div class="center" layout="column" flex>
        <div class="header" layout="row" layout-wrap layout-align="space-between center">
            <div class="white-fg" layout="row" layout-gt-xs="row" layout-gt-sm="column" layout-align="start start">
                <div class="h1" layout="row" layout-align="start center">
                    <md-icon md-font-icon="icon-cube-outline"></md-icon>
                    <span translate="User Permission">User Permission</span>
                </div>
            </div>
            <div class="search" layout="row" layout-align="start center" flex="60" flex-gt-xs="60" flex-gt-sm="33" align="center">
                <md-icon md-font-icon="icon-magnify" class="white-text icon search-icon"></md-icon>
                <input id="modelsearch" ng-model="Search" class="search-input" ng-change="GetSerch(Search)" type="text" placeholder="Search" translate translate-attr-placeholder="SEARCH" flex>
            </div>
            <div flex="40" flex-gt-xs="40" flex-gt-sm="33" layout="row" layout-align="end center">
            </div>
        </div>
        <div class="content-card" layout="column" flex>
            <div class="content fullpage-datatable" layout="column" layout-padding flex>
                <div class="row">
                    <md-input-container class="md-block" flex>
                        <label>Role</label>
                        <md-select ng-model="model.RoleName" ng-change="GetAllPermissionByRole()">
                            <md-option value="">Select Role</md-option>
                            <md-option value="{{o.RoleName}}" ng-repeat="o in lstRoles| orderBy: 'RoleName'">{{o.RoleName}}</md-option>
                        </md-select>
                    </md-input-container>
                </div>
                <table class="dataTable cell-border row-border hover" datatable="ng" dt-options="dtCustomOptions" dt-instance="dtInstance" dt-column-defs="dtColumnDefs">
                    <thead>
                        <tr>
                            <th class="secondary-text">
                                <div class="table-header">
                                    <span class="column-title">No</span>
                                </div>
                            </th>
                            <th class="secondary-text">
                                <div class="table-header">
                                    <span class="column-title">Module</span>
                                </div>
                            </th>
                            <th class="secondary-text">
                                <div class="table-header">
                                    <span class="column-title">
                                                        <md-checkbox value="modelPermission.View" ng-model="modelPermission.View" aria-label="View"
                                                        class="md-accent" ng-change="ChangePermissionAllView()">
                                                        View
                                                    </md-checkbox>
                                                </span>
                                </div>
                            </th>
                            <th class="secondary-text">
                                <div class="table-header">
                                    <span class="column-title">
                                                    <md-checkbox value="modelPermission.Add"ng-model="modelPermission.Add" aria-label="View"
                                                    class="md-accent" ng-change="ChangePermissionAllAdd()">
                                                    Add
                                                </md-checkbox>
                                            </span>
                                </div>
                            </th>
                            <th class="secondary-text">
                                <div class="table-header">
                                    <span class="column-title">
                                                <md-checkbox value="modelPermission.Update" ng-model="modelPermission.Update" aria-label="View"
                                                class="md-accent" ng-change="ChangePermissionAllUpdate()">
                                                Update
                                            </md-checkbox>
                                        </span>
                                </div>
                            </th>
                            <th class="secondary-text">
                                <div class="table-header">
                                    <span class="column-title">
                                            <md-checkbox value="modelPermission.Delete" ng-model="modelPermission.Delete" aria-label="View"
                                            class="md-accent" ng-change="ChangePermissionAllDelete()">
                                            Delete
                                        </md-checkbox>
                                    </span>
                                </div>
                            </th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr ng-repeat="o in lstModules | orderBy: 'Module'">
                            <td style="width: 4%; text-align: center;">{{$index+1}}</td>
                            <td>{{o.Module}}</td>
                            <td class="text-center" style="width:15%">
                                <md-checkbox ng-model="o.Show" value="o.Show" ng-change="ChangePermission(o)" aria-label="View" class="md-accent">
                                </md-checkbox>
                            </td>
                            <td class="text-center" style="width: 15%">
                                <md-checkbox ng-model="o.Added" value="o.Added" ng-change="ChangePermission(o)" aria-label="Add" class="md-accent">
                                </md-checkbox>
                            </td>
                            <td class="text-center" style="width: 15%">
                                <md-checkbox ng-model="o.Modified" value="o.Modified" ng-change="ChangePermission(o)" aria-label="Update" class="md-accent">
                                </md-checkbox>
                            </td>
                            <td class="text-center" style="width: 15%">
                                <md-checkbox ng-model="o.Deleted" value="o.Deleted" ng-change="ChangePermission(o)" aria-label="View" class="md-accent">
                                </md-checkbox>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
