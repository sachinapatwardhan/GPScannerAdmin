<md-dialog class="task-dialog" aria-label="New Task">
    <md-toolbar class="md-accent md-hue-2">
        <div class="md-toolbar-tools">
            <h2>Import SIM From Excel</h2>
            <span flex></span>
            <md-button class="md-icon-button" ng-click="closeModel()">
                <md-icon md-font-icon="icon-close" aria-label="Close dialog"></md-icon>
            </md-button>
        </div>
    </md-toolbar>
    <md-dialog-content ms-scroll>
        <form Name="formImport" class="md-inline-form">
            <div layout="row " layout-wrap>
                <md-input-container class="md-block" flex="45" flex-gt-sm="45">
                    <label>Telephone Company</label>
                    <md-select Name="idTelCo" ng-model="idTelCo" md-on-close="clearSearchTerm()" data-md-container-class="selectdemoSelectHeader">
                        <md-select-header class="demo-select-header">
                            <input ng-model="vm.searchTermidTelCo" type="search" placeholder="Search for a Company.." class="demo-header-searchbox md-text" ng-keydown="onSearchChange($event)">
                        </md-select-header>
                        <md-option ng-value="{{o.id}}" ng-repeat="o in lstCompany | filter:vm.searchTermidTelCo | orderBy: 'Name'">{{o.Name}}</md-option>
                    </md-select>
                    <div ng-messages="formTrackingdetails.idTelCo.$error" ng-if="formTrackingdetails.idTelCo.$touched" role="alert">
                        <div ng-message="required">
                            <span>Telephone Company is required.</span>
                        </div>
                    </div>
                </md-input-container>
                <md-input-container class="md-block" flex="45" flex-gt-sm="45" ng-if="vm.UserRoles =='Super Admin'">
                    <label>App Name</label>
                    <md-select Name="AppName" ng-model="model.idApp" md-on-close="clearSearchTerm()" data-md-container-class="selectdemoSelectHeader" required>
                        <md-select-header class="demo-select-header">
                            <input ng-model="vm.searchTermidAppName" type="search" placeholder="Search for a APP Name.." class="demo-header-searchbox md-text" ng-keydown="onSearchChange($event)">
                        </md-select-header>
                        <md-option ng-value="{{o.id}}" ng-repeat="o in lstAppInfo | filter:vm.searchTermidAppName track by o.id">{{o.AppName}}</md-option>
                    </md-select>
                    <div ng-messages="formTrackingdetails.AppName.$error" ng-if="formTrackingdetails.AppName.$touched" role="alert">
                        <div ng-message="required">
                            <span>App Name is required.</span>
                        </div>
                    </div>
                </md-input-container>
            </div>
            <md-content class="md-padding">

                <p>You must upload file same as excel template for Import SIM .
                    <br/>
                    <!-- <small>you can download excel template for import excel file.</small> -->
                </p>
                <lf-ng-md-file-input name="files1" lf-files="Productfiles" lf-mimetype="application/vnd.openxmlformats-officedocument.spreadsheetml.sheet" lf-required lf-maxcount="1" lf-api="apiReset" lf-filesize="10MB" ng-click="Reset()"></lf-ng-md-file-input>
                <div ng-messages="formImport.files1.$error" style="color:red;">
                    <div ng-message="required">You must Select file.</div>
                    <div ng-message="maxcount">Too much files.</div>
                    <div ng-message="filesize">File size too large.</div>
                    <div ng-message="mimetype">Only Excel File Supported.</div>
                </div>
            </md-content>
            <div align="left">
                <md-button class="md-raised md-primary" ng-disabled="!formImport.$valid" ng-click="Import(model)">Import</md-button>
                <md-button class="md-raised md-warn" ng-click="closeModel()">Close Model</md-button>
            </div>
        </form>
        </md-content>
    </md-dialog-content>
</md-dialog>
