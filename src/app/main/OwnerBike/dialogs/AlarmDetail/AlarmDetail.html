<md-dialog class="flex-50">
    <md-toolbar class="md-accent md-hue-2">
        <div class="md-toolbar-tools" layout="row" layout-align="space-between">
            <span class="title">Alarm Detail</span>
            <md-button class="md-icon-button" ng-click="closeModel()">
                <md-icon md-font-icon="icon-close" aria-label="Close dialog"></md-icon>
            </md-button>
        </div>
    </md-toolbar>
    <md-dialog-content>
        <ms-form-wizard flex>
            <table class="dataTable row-border hover" datatable="ng" dt-options="dtOptions" dt-column-defs="vm.dtColumnDefs">
                <thead>
                    <tr>
                        <th class="all">
                            <div class="table-header">
                                <span class="column-title">No</span>
                            </div>
                        </th>
                        <th class="secondary-text">
                            <div class="table-header">
                                <span class="column-title">Date</span>
                            </div>
                        </th>
                        <th class="secondary-text">
                            <div class="secondary-text">
                                <span class="column-title">Type</span>
                            </div>
                        </th>
                    </tr>
                </thead>
                <tbody>
                    <tr ng-repeat="o in lstAlarmdetail">
                        <td>{{ $index+1 }}</td>
                        <td>{{ o.Datetime | date: 'dd/MM/yyyy HH:mm:ss'}}</td>
                        <td ng-if="o.AlarmCode=='5'">Over Speed</td>
                        <td ng-if="o.AlarmCode=='7'">Vibration</td>
                    </tr>
                </tbody>
            </table>
        </ms-form-wizard>
    </md-dialog-content>
</md-dialog>
